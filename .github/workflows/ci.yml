name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select an available iPhone simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator was found."
            exit 1
          fi
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project DecibelMeter.xcodeproj \
            -scheme DecibelMeter \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO
